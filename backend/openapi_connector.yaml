openapi: 3.0.0
info:
  title: DAOM 문서 추출 커넥터
  description: |
    AI 기반 문서 데이터 추출 서비스 - Power Automate Custom Connector
    
    ## 주요 기능
    - 📄 문서 업로드 및 데이터 추출
    - 🔍 추출 결과 조회
    - ⏳ 비동기 폴링 지원
    - 📋 모델 목록 조회
    - ❌ 작업 취소
  version: 1.0.0
  contact:
    name: DAOM Support

servers:
  - url: https://{host}/api/v1
    variables:
      host:
        default: your-daom-instance.azurewebsites.net
        description: DAOM Backend Host

securityDefinitions:
  oauth2_auth:
    type: oauth2
    flow: accessCode
    authorizationUrl: https://login.microsoftonline.com/{tenant-id}/oauth2/v2.0/authorize
    tokenUrl: https://login.microsoftonline.com/{tenant-id}/oauth2/v2.0/token
    scopes:
      api://{client-id}/.default: Default scope

security:
  - oauth2_auth: []

paths:
  /connectors/upload:
    post:
      operationId: UploadDocument
      summary: 📄 문서 업로드
      description: 파일을 업로드하고 추출 작업을 시작합니다
      consumes:
        - multipart/form-data
      parameters:
        - name: file
          in: formData
          type: file
          required: true
          description: 추출할 문서 파일 (PDF, 이미지 등)
        - name: model_id
          in: formData
          type: string
          required: true
          description: 사용할 추출 모델 ID
        - name: metadata
          in: formData
          type: string
          required: false
          description: 사용자 정의 메타데이터 (JSON 문자열)
        - name: webhook_url
          in: formData
          type: string
          required: false
          description: 완료 시 콜백 URL
      responses:
        202:
          description: 작업 시작됨
          schema:
            type: object
            properties:
              job_id:
                type: string
                description: 작업 ID
              status:
                type: string
              message:
                type: string
              poll_url:
                type: string

  /connectors/result/{job_id}:
    get:
      operationId: GetExtractionResult
      summary: 🔍 추출 결과 조회
      description: Job ID로 추출 상태 및 결과를 조회합니다
      parameters:
        - name: job_id
          in: path
          type: string
          required: true
          description: 작업 ID
      responses:
        200:
          description: 완료된 결과
          schema:
            $ref: '#/definitions/ExtractionResult'
        202:
          description: 처리 중
          schema:
            $ref: '#/definitions/ExtractionResult'

  /connectors/wait/{job_id}:
    get:
      operationId: WaitForExtraction
      summary: ⏳ 추출 완료 대기
      description: 추출이 완료될 때까지 대기합니다 (Async Polling Pattern)
      x-ms-trigger: poll
      parameters:
        - name: job_id
          in: path
          type: string
          required: true
      responses:
        200:
          description: 추출 완료
          schema:
            $ref: '#/definitions/ExtractionResult'
        202:
          description: 처리 중
          headers:
            Retry-After:
              type: integer
              description: 재시도 간격 (초)
            Location:
              type: string
              description: 폴링 URL

  /connectors/models:
    get:
      operationId: ListModels
      summary: 📋 모델 목록 조회
      description: 사용 가능한 추출 모델 목록을 반환합니다
      responses:
        200:
          description: 모델 목록
          schema:
            type: object
            properties:
              models:
                type: array
                items:
                  $ref: '#/definitions/Model'
              total:
                type: integer

  /connectors/cancel/{job_id}:
    post:
      operationId: CancelExtraction
      summary: ❌ 작업 취소
      description: 진행 중인 추출 작업을 취소합니다
      parameters:
        - name: job_id
          in: path
          type: string
          required: true
      responses:
        200:
          description: 취소 완료
          schema:
            type: object
            properties:
              job_id:
                type: string
              status:
                type: string
              message:
                type: string

definitions:
  ExtractionResult:
    type: object
    properties:
      job_id:
        type: string
      status:
        type: string
        enum: [pending, processing, completed, failed, cancelled]
      model_id:
        type: string
      model_name:
        type: string
      filename:
        type: string
      extracted_data:
        type: object
        description: 추출된 데이터 (필드 별 값)
      confidence:
        type: number
        description: 평균 신뢰도 (0.0 ~ 1.0)
      error:
        type: string
      metadata:
        type: object
        description: 사용자 정의 메타데이터 (passthrough)
      created_at:
        type: string

  Model:
    type: object
    properties:
      id:
        type: string
      name:
        type: string
      description:
        type: string
