name: Deploy Frontend (Test)

on:
  push:
    branches: ['feature/*', 'fix/*']
    paths:
      - 'frontend/**'
      - 'backend/**'
      - '.github/workflows/deploy-test.yml'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_FE: ${{ github.repository }}/frontend
  IMAGE_NAME_BE: ${{ github.repository }}/backend
  RESOURCE_GROUP: Dalle2
  CONTAINER_APP_FE: daom-frontend
  CONTAINER_APP_BE: daom-backend

jobs:
  build-and-deploy-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Environment
        id: vars
        run: |
          echo "SHORT_SHA=$(echo ${{ github.sha }} | cut -c 1-7)" >> $GITHUB_OUTPUT
          echo "LOWER_IMAGE_FE=$(echo ${{ github.repository }}/frontend | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
          echo "LOWER_IMAGE_BE=$(echo ${{ github.repository }}/backend | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
          # Create safe branch name for revision suffix
          SAFE_BRANCH=$(echo "${{ github.ref_name }}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | cut -c 1-15)
          echo "SAFE_BRANCH=${SAFE_BRANCH}" >> $GITHUB_OUTPUT

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build Frontend
      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.vars.outputs.LOWER_IMAGE_FE }}:test-${{ steps.vars.outputs.SHORT_SHA }}
          build-args: |
            VITE_API_BASE_URL=https://daom-backend.greenpebble-00aa1dc4.koreacentral.azurecontainerapps.io/api/v1

      # Build Backend
      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.vars.outputs.LOWER_IMAGE_BE }}:test-${{ steps.vars.outputs.SHORT_SHA }}

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Test Revisions
        uses: azure/cli@v2
        with:
          inlineScript: |
            set -e
            az config set extension.use_dynamic_install=yes_without_prompt
            
            SHORT_SHA="${{ steps.vars.outputs.SHORT_SHA }}"
            SAFE_BRANCH="${{ steps.vars.outputs.SAFE_BRANCH }}"
            SUFFIX="test-${SHORT_SHA}"
            RG=${{ env.RESOURCE_GROUP }}

            echo "============================================"
            echo "🧪 TEST DEPLOYMENT"
            echo "Branch: ${{ github.ref_name }}"
            echo "Suffix: $SUFFIX"
            echo "============================================"

            # --- FRONTEND ---
            FE_APP=${{ env.CONTAINER_APP_FE }}
            FE_IMAGE="${{ env.REGISTRY }}/${{ steps.vars.outputs.LOWER_IMAGE_FE }}:test-${SHORT_SHA}"
            FE_REVISION="${FE_APP}--${SUFFIX}"

            echo ">> Deploying Frontend: $FE_IMAGE"
            
            az containerapp registry set \
              --name $FE_APP --resource-group $RG \
              --server ghcr.io \
              --username ${{ github.actor }} \
              --password ${{ secrets.GITHUB_TOKEN }}

            az containerapp update \
              --name $FE_APP --resource-group $RG \
              --image $FE_IMAGE \
              --revision-suffix $SUFFIX

            # --- BACKEND ---
            BE_APP=${{ env.CONTAINER_APP_BE }}
            BE_IMAGE="${{ env.REGISTRY }}/${{ steps.vars.outputs.LOWER_IMAGE_BE }}:test-${SHORT_SHA}"
            BE_REVISION="${BE_APP}--${SUFFIX}"

            echo ">> Deploying Backend: $BE_IMAGE"
            
            az containerapp registry set \
              --name $BE_APP --resource-group $RG \
              --server ghcr.io \
              --username ${{ github.actor }} \
              --password ${{ secrets.GITHUB_TOKEN }}

            az containerapp update \
              --name $BE_APP --resource-group $RG \
              --image $BE_IMAGE \
              --revision-suffix $SUFFIX

            echo ""
            echo "============================================"
            echo "✅ TEST DEPLOYMENT COMPLETE"
            echo ""
            echo "Frontend Revision: $FE_REVISION"
            echo "Backend Revision:  $BE_REVISION"
            echo ""
            echo "⚠️  Note: Traffic is NOT routed to test revisions."
            echo "    Access directly via revision URL or manually route traffic."
            echo "============================================"
