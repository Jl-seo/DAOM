name: Trigger auto deployment for daom-backend

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ fix/extraction-issues ]
    paths:
    - '**'
    - '.github/workflows/daom-backend-AutoDeployTrigger-0dc28aa4-586a-4275-8284-630d0b905ccb.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.DAOMBACKEND_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.DAOMBACKEND_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.DAOMBACKEND_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: dexdaom-h6d5e6fchsbyh0f2.azurecr.io
          registryUsername: ${{ secrets.DAOMBACKEND_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.DAOMBACKEND_REGISTRY_PASSWORD }}
          containerAppName: daom-backend
          resourceGroup: Dalle2
          imageToBuild: dexdaom-h6d5e6fchsbyh0f2.azurecr.io/daom-backend:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


