name: Deploy Frontend to Azure Container Apps

on:
  push:
    branches: [master, 'feature/*']
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/frontend
  RESOURCE_GROUP: Dalle2
  CONTAINER_APP_NAME: daom-frontend
  CONTAINER_APP_ENV: daom-env

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Environment
        id: vars
        run: |
          echo "SHORT_SHA=$(echo ${{ github.sha }} | cut -c 1-7)" >> $GITHUB_OUTPUT
          echo "LOWER_IMAGE_NAME=$(echo ${{ github.repository }}/frontend | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.vars.outputs.LOWER_IMAGE_NAME }}:${{ steps.vars.outputs.SHORT_SHA }}
          build-args: |
            VITE_API_BASE_URL=https://daom-backend.greenpebble-00aa1dc4.koreacentral.azurecontainerapps.io/api/v1

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Apps (Labels Mode)
        uses: azure/cli@v2
        with:
          inlineScript: |
            set -e
            az config set extension.use_dynamic_install=yes_without_prompt
            
            # Upgrade containerapp extension to get --target-label support (preview feature)
            echo "0. Upgrading containerapp extension..."
            az extension add --name containerapp --upgrade --yes
            az extension show --name containerapp --query version -o tsv
            
            # Common params
            TIMESTAMP=$(date +%s | cut -c 6-10)
            SHORT_SHA_VAL="${{ steps.vars.outputs.SHORT_SHA }}"
            
            if [[ "${{ github.ref_name }}" == "master" ]]; then
              echo "Deploying to PRODUCTION"
              LABEL="production"
            else
              SAFE_BRANCH=$(echo "${{ github.ref_name }}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | cut -c 1-10)
              echo "Deploying to TEST: $SAFE_BRANCH"
              LABEL="test-$SAFE_BRANCH"
            fi
            
            APP_NAME=${{ env.CONTAINER_APP_NAME }}
            RG=${{ env.RESOURCE_GROUP }}
            IMAGE="${{ env.REGISTRY }}/${{ steps.vars.outputs.LOWER_IMAGE_NAME }}:${SHORT_SHA_VAL}"

            echo "=========================================="
            echo "Deploying to label: $LABEL"
            echo "Image: $IMAGE"
            echo "=========================================="

            # In "labels" revision mode, use --target-label to create new revision 
            # and assign it to the label atomically (per Microsoft docs)
            # https://learn.microsoft.com/en-us/azure/container-apps/deployment-labels
            echo "1. Creating new revision with target label '$LABEL'..."
            az containerapp update \
              --name $APP_NAME \
              --resource-group $RG \
              --image $IMAGE \
              --target-label $LABEL

            echo "✓ Deployment complete!"
            echo "   Label '$LABEL' now points to new revision with image $IMAGE"

