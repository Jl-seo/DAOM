name: Deploy Frontend to Azure Container Apps

on:
  push:
    branches: [master, 'feature/*', 'fix/*']
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/frontend
  RESOURCE_GROUP: Dalle2
  CONTAINER_APP_NAME: daom-frontend
  CONTAINER_APP_ENV: daom-env

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Environment
        id: vars
        run: |
          echo "SHORT_SHA=$(echo ${{ github.sha }} | cut -c 1-7)" >> $GITHUB_OUTPUT
          echo "LOWER_IMAGE_NAME=$(echo ${{ github.repository }}/frontend | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.vars.outputs.LOWER_IMAGE_NAME }}:${{ steps.vars.outputs.SHORT_SHA }}
          build-args: |
            VITE_API_BASE_URL=https://daom-backend.greenpebble-00aa1dc4.koreacentral.azurecontainerapps.io/api/v1

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Apps
        uses: azure/cli@v2
        with:
          inlineScript: |
            set -e
            az config set extension.use_dynamic_install=yes_without_prompt
            
            # Params
            SHORT_SHA_VAL="${{ steps.vars.outputs.SHORT_SHA }}"
            SUFFIX="${SHORT_SHA_VAL}"
            
            APP_NAME=${{ env.CONTAINER_APP_NAME }}
            RG=${{ env.RESOURCE_GROUP }}
            IMAGE="${{ env.REGISTRY }}/${{ steps.vars.outputs.LOWER_IMAGE_NAME }}:${SHORT_SHA_VAL}"
            REVISION_NAME="${APP_NAME}--${SUFFIX}"

            echo "==========================================="
            echo "App: $APP_NAME"
            echo "Image: $IMAGE"
            echo "Revision: $REVISION_NAME"
            echo "==========================================="

            # Step 1: Set registry credentials for ghcr.io
            echo "1. Setting registry credentials..."
            az containerapp registry set \
              --name $APP_NAME \
              --resource-group $RG \
              --server ghcr.io \
              --username ${{ github.actor }} \
              --password ${{ secrets.GITHUB_TOKEN }}

            # Step 2: Deploy new revision
            echo "2. Deploying new revision..."
            az containerapp update \
              --name $APP_NAME \
              --resource-group $RG \
              --image $IMAGE \
              --revision-suffix $SUFFIX

            # Step 3: Route 100% traffic to new revision (for master branch)
            if [[ "${{ github.ref_name }}" == "master" ]]; then
              echo "3. Routing 100% traffic to new revision..."
              az containerapp ingress traffic set \
                --name $APP_NAME \
                --resource-group $RG \
                --revision-weight ${REVISION_NAME}=100
            fi

            echo "✓ Deployment complete!"
