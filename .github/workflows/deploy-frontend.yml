name: Deploy Frontend to Azure Container Apps

on:
  push:
    branches: [master, 'feature/*']
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/frontend
  RESOURCE_GROUP: Dalle2
  CONTAINER_APP_NAME: daom-frontend
  CONTAINER_APP_ENV: daom-env

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Apps (Multi-Revision)
        uses: azure/cli@v2
        with:
          inlineScript: |
            az config set extension.use_dynamic_install=yes_without_prompt
            
            # Determine Revision Config based on Branch
            if [[ "${{ github.ref_name }}" == "master" ]]; then
              echo "Deploying to PRODUCTION (Traffic: 100%)"
              REVISION_SUFFIX=""
              # No label for main production usually, or "prod"
              # Traffic 100% implicitly makes it latest
              CMD_ARGS="--traffic-weight 100"
            else
              # Clean branch name for suffix (lowercase, alphanumeric only)
              SAFE_BRANCH=$(echo "${{ github.ref_name }}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | cut -c 1-10)
              SUFFIX="-$SAFE_BRANCH-$(date +%s | cut -c 6-10)"
              LABEL="test-$SAFE_BRANCH"
              
              echo "Deploying to TEST Revision (Label: $LABEL, Traffic: 0%)"
              # Set traffic to 0 for the new revision, but give it a label for URL access
              CMD_ARGS="--traffic-weight 0 --revision-suffix $SUFFIX --label $LABEL"
            fi

            echo "Deploying..."
            az containerapp update \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
              $CMD_ARGS
