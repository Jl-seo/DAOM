name: Deploy Frontend to Azure Container Apps

on:
  push:
    branches: [master, 'feature/*']
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/frontend
  RESOURCE_GROUP: Dalle2
  CONTAINER_APP_NAME: daom-frontend
  CONTAINER_APP_ENV: daom-env

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Environment
        id: vars
        run: |
          echo "SHORT_SHA=$(echo ${{ github.sha }} | cut -c 1-7)" >> $GITHUB_OUTPUT
          echo "LOWER_IMAGE_NAME=$(echo ${{ github.repository }}/frontend | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.vars.outputs.LOWER_IMAGE_NAME }}:${{ steps.vars.outputs.SHORT_SHA }}
          build-args: |
            VITE_API_BASE_URL=https://daom-backend.greenpebble-00aa1dc4.koreacentral.azurecontainerapps.io/api/v1

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Apps (Multi-Revision)
        uses: azure/cli@v2
        with:
          inlineScript: |
            set -e
            az config set extension.use_dynamic_install=yes_without_prompt
            
            # Common params
            SAFE_BRANCH=$(echo "${{ github.ref_name }}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | cut -c 1-10)
            TIMESTAMP=$(date +%s | cut -c 6-10)
            SHORT_SHA_VAL="${{ steps.vars.outputs.SHORT_SHA }}"
            
            if [[ "${{ github.ref_name }}" == "master" ]]; then
              echo "Deploying to PRODUCTION"
              SUFFIX="prod-$TIMESTAMP"
              LABEL="production"
            else
              echo "Deploying to TEST Revision"
              SUFFIX="test-$SAFE_BRANCH-$TIMESTAMP"
              LABEL="test-$SAFE_BRANCH"
            fi
            
            APP_NAME=${{ env.CONTAINER_APP_NAME }}
            RG=${{ env.RESOURCE_GROUP }}
            IMAGE="${{ env.REGISTRY }}/${{ steps.vars.outputs.LOWER_IMAGE_NAME }}:${SHORT_SHA_VAL}"
            REVISION_NAME="$APP_NAME--$SUFFIX"

            # Step 0: Check revision mode and current active revision
            echo "0. Checking current app configuration..."
            REVISION_MODE=$(az containerapp show \
              --name $APP_NAME \
              --resource-group $RG \
              --query "properties.configuration.activeRevisionsMode" -o tsv)
            echo "   Revision Mode: $REVISION_MODE"
            
            # Get current active revision name for traffic handling
            CURRENT_REVISION=$(az containerapp show \
              --name $APP_NAME \
              --resource-group $RG \
              --query "properties.latestRevisionName" -o tsv)
            echo "   Current Active Revision: $CURRENT_REVISION"
            
            # Step 1: For labels mode, first ensure traffic is on a labeled revision
            # This prevents ContainerAppLabelsModeTargetLabelRequired error
            if [[ "$REVISION_MODE" == "labels" ]]; then
              echo "1. [Labels Mode] Ensuring traffic is assigned to labeled revision..."
              # Check if production label exists and points to current revision
              LABELED_REVISION=$(az containerapp revision label show \
                --name $APP_NAME \
                --resource-group $RG \
                --label $LABEL \
                --query "revisionName" -o tsv 2>/dev/null || echo "")
              
              if [[ -z "$LABELED_REVISION" ]]; then
                echo "   No revision has '$LABEL' label. Assigning to current revision first..."
                az containerapp revision label add \
                  --resource-group $RG \
                  --name $APP_NAME \
                  --label $LABEL \
                  --revision $CURRENT_REVISION \
                  --no-prompt || true
                
                # Ensure 100% traffic to this label
                az containerapp ingress traffic set \
                  --resource-group $RG \
                  --name $APP_NAME \
                  --label-weight $LABEL=100 || true
              fi
              echo "   ✓ Traffic configuration ready for update"
            fi

            # Step 2: Deploy new revision
            echo "2. Deploying new revision: $REVISION_NAME"
            az containerapp update \
              --name $APP_NAME \
              --resource-group $RG \
              --image $IMAGE \
              --revision-suffix $SUFFIX

            # Step 3: Assign label to new revision (moves it from old revision)
            echo "3. Assigning Label '$LABEL' to new revision..."
            az containerapp revision label add \
              --resource-group $RG \
              --name $APP_NAME \
              --label $LABEL \
              --revision $REVISION_NAME \
              --no-prompt

            # Step 4: Traffic Management - route 100% to the new labeled revision
            if [[ "${{ github.ref_name }}" == "master" ]]; then
              echo "4. Switching Production Traffic to 100%"
              az containerapp ingress traffic set \
                --resource-group $RG \
                --name $APP_NAME \
                --label-weight $LABEL=100
            fi
            
            echo "✓ Deployment complete: $REVISION_NAME"
