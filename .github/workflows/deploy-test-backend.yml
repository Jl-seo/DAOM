name: Deploy Backend (Test)

on:
  push:
    branches: ['feature/*', 'fix/*']
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-test-backend.yml'
  workflow_dispatch:

env:
  REGISTRY: dexdaom-h6d5e6fchsbyh0f2.azurecr.io
  IMAGE_NAME: backend
  RESOURCE_GROUP: Dalle2
  CONTAINER_APP: daom-backend

jobs:
  build-and-deploy-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Environment
        id: vars
        run: |
          echo "SHORT_SHA=$(echo ${{ github.sha }} | cut -c 1-7)" >> $GITHUB_OUTPUT

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:test-${{ steps.vars.outputs.SHORT_SHA }}

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Backend Revision
        uses: azure/cli@v2
        with:
          inlineScript: |
            set -e
            az config set extension.use_dynamic_install=yes_without_prompt
            
            SHORT_SHA="${{ steps.vars.outputs.SHORT_SHA }}"
            SUFFIX="test-${SHORT_SHA}"
            RG=${{ env.RESOURCE_GROUP }}
            APP_NAME=${{ env.CONTAINER_APP }}
            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:test-${SHORT_SHA}"
            REVISION="${APP_NAME}--${SUFFIX}"

            echo "============================================"
            echo "🧪 BACKEND TEST DEPLOYMENT"
            echo "Branch: ${{ github.ref_name }}"
            echo "Image: $IMAGE"
            echo "============================================"

            # Remove ghcr.io registry if exists (cleanup from wrong workflow)
            echo ">> Cleaning up old ghcr.io registry..."
            az containerapp registry remove \
              --name $APP_NAME --resource-group $RG \
              --server ghcr.io 2>/dev/null || echo "No ghcr.io registry to remove"

            echo ">> Setting ACR registry..."
            az containerapp registry set \
              --name $APP_NAME --resource-group $RG \
              --server ${{ env.REGISTRY }} \
              --username ${{ secrets.ACR_USERNAME }} \
              --password ${{ secrets.ACR_PASSWORD }}

            echo ">> Updating container image..."
            az containerapp update \
              --name $APP_NAME --resource-group $RG \
              --image $IMAGE \
              --container-name $APP_NAME \
              --revision-suffix $SUFFIX

            echo ">> Routing 100% traffic to revision: $REVISION"
            az containerapp ingress traffic set \
              --name $APP_NAME --resource-group $RG \
              --revision-weight ${REVISION}=100
