name: Trigger auto deployment for daom-frontend

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  # push:
  #   branches: 
  #     [ fix/extraction-issues ]
  #   paths:
  #   - '**'
  #   - '.github/workflows/daom-frontend-AutoDeployTrigger-0ba9b177-a831-4f00-bf0d-1d0173e4cc70.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.DAOMFRONTEND_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.DAOMFRONTEND_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.DAOMFRONTEND_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: dexdaom-h6d5e6fchsbyh0f2.azurecr.io
          registryUsername: ${{ secrets.DAOMFRONTEND_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.DAOMFRONTEND_REGISTRY_PASSWORD }}
          containerAppName: daom-frontend
          resourceGroup: Dalle2
          imageToBuild: dexdaom-h6d5e6fchsbyh0f2.azurecr.io/daom-frontend:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


