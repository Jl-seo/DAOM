name: Deploy Backend to Azure Container Apps

on:
  push:
    branches: [master, 'feature/*']
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/backend
  RESOURCE_GROUP: Dalle2
  CONTAINER_APP_NAME: daom-backend
  CONTAINER_APP_ENV: daom-env

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Environment
        id: vars
        run: |
          echo "SHORT_SHA=$(echo ${{ github.sha }} | cut -c 1-7)" >> $GITHUB_OUTPUT
          echo "LOWER_IMAGE_NAME=$(echo ${{ github.repository }}/backend | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.vars.outputs.LOWER_IMAGE_NAME }}:${{ steps.vars.outputs.SHORT_SHA }}

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Apps (Part 1: Config)
        uses: azure/cli@v2
        with:
          inlineScript: |
            az config set extension.use_dynamic_install=yes_without_prompt
            
            APP_NAME=${{ env.CONTAINER_APP_NAME }}
            RG=${{ env.RESOURCE_GROUP }}
            
            echo "Refreshing Registry Credentials"
            az containerapp registry set \
              --name $APP_NAME \
              --resource-group $RG \
              --server ghcr.io \
              --username ${{ github.actor }} \
              --password ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to Azure Container Apps (Part 2: Revision)
        uses: azure/cli@v2
        with:
          inlineScript: |
            az config set extension.use_dynamic_install=yes_without_prompt
            
            # Common params
            SAFE_BRANCH=$(echo "${{ github.ref_name }}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | cut -c 1-10)
            TIMESTAMP=$(date +%s | cut -c 6-10)
            SHORT_SHA_VAL="${{ steps.vars.outputs.SHORT_SHA }}"
            
            if [[ "${{ github.ref_name }}" == "master" ]]; then
              echo "Deploying to PRODUCTION"
              SUFFIX="prod-$TIMESTAMP"
              LABEL="production"
            else
              echo "Deploying to TEST Revision"
              SUFFIX="test-$SAFE_BRANCH-$TIMESTAMP"
              LABEL="test-$SAFE_BRANCH"
            fi
            
            APP_NAME=${{ env.CONTAINER_APP_NAME }}
            RG=${{ env.RESOURCE_GROUP }}
            IMAGE="${{ env.REGISTRY }}/${{ steps.vars.outputs.LOWER_IMAGE_NAME }}:${SHORT_SHA_VAL}"
            REVISION_NAME="$APP_NAME--$SUFFIX"

            echo "Deploying new revision: $REVISION_NAME"
            az containerapp update \
              --name $APP_NAME \
              --resource-group $RG \
              --image $IMAGE \
              --revision-suffix $SUFFIX \
              --ingress-target-port 8000 \
              --query properties.configuration.activeRevisionsMode

            echo "Assigning Label: $LABEL"
            az containerapp revision label add \
              --resource-group $RG \
              --name $APP_NAME \
              --label $LABEL \
              --revision $REVISION_NAME \
              --no-prompt

            # Traffic Management
            if [[ "${{ github.ref_name }}" == "master" ]]; then
              echo "Switching Production Traffic to 100%"
              az containerapp ingress traffic set \
                --resource-group $RG \
                --name $APP_NAME \
                --label-weight $LABEL=100
            fi
